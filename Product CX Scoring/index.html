<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CX / Product Review Scorecard</title>

<style>
:root{
  --green:#00B956;
  --green-hover:#00A94F;
  --green-pressed:#009447;
  --purple:#731982;

  --bg:#F2F4F7;
  --card:#FFFFFF;
  --surface:#F7F8FA;

  --border:#D2D5DA;
  --border-soft:#E6E9EE;

  --text:#2B2D33;
  --secondary:#8F96A4;

  --success-bg:#EAFBF1;
  --info-bg:#DDF5FF;
  --warning-bg:#FFF6E5;
  --error-bg:#FFF0F0;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  font-family:"MegaFon Graphik LC","Inter",Arial,sans-serif;
  color:var(--text);
}

.container{
  max-width:1440px;
  margin:0 auto;
  padding:40px 32px 80px;
}

.hero{
  background:linear-gradient(135deg,#FFFFFF 0%,#EAFBF1 60%,#DDF5FF 100%);
  border:1px solid var(--border);
  border-radius:24px;
  padding:40px;
  box-shadow:0 16px 40px rgba(43,45,51,.08);
  margin-bottom:24px;
}

h1{
  margin:0 0 12px;
  font-size:44px;
  line-height:1.05;
  font-weight:700;
  letter-spacing:-.03em;
}

.hero-sub{
  color:var(--secondary);
  font-size:17px;
  margin-bottom:28px;
}

.hero-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;
}

input,select,textarea{
  width:100%;
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px 14px;
  font-size:15px;
  font-family:inherit;
  background:#fff;
  outline:none;
}

input:focus,
select:focus,
textarea:focus{
  border-color:var(--green);
  box-shadow:0 0 0 4px rgba(0,185,86,.12);
}

textarea{
  resize:none;
  min-height:72px;
  max-height:72px;
}

.sticky{
  position:sticky;
  top:0;
  z-index:100;
  margin-bottom:24px;
}

.score-panel{
  background:#fff;
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px 24px;
  box-shadow:0 10px 28px rgba(43,45,51,.08);
}

.score-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}

.score-main{
  display:flex;
  gap:24px;
  align-items:center;
  flex-wrap:wrap;
}

.score-value{
  font-size:36px;
  font-weight:700;
}

.badge{
  padding:8px 14px;
  border-radius:999px;
  font-weight:700;
  font-size:14px;
}

.progress{
  width:280px;
  height:12px;
  background:var(--surface);
  border-radius:999px;
  overflow:hidden;
}

.progress-fill{
  width:0;
  height:100%;
  background:linear-gradient(90deg,var(--green),#00D2FF);
}

.btns{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

button{
  border:none;
  border-radius:14px;
  padding:12px 16px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
}

.btn-primary{
  background:var(--green);
  color:#fff;
}

.btn-secondary{
  background:#fff;
  border:1px solid var(--border);
}

.rules{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-bottom:24px;
}

.rule{
  background:#fff;
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
}

.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:24px;
  box-shadow:0 12px 32px rgba(43,45,51,.06);
  margin-bottom:20px;
  overflow:hidden;
}

.block-header{
  padding:24px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  background:linear-gradient(180deg,#FFFFFF 0%,#F7F8FA 100%);
}

.block-left h3{
  margin:0;
  font-size:22px;
}

.block-left p{
  margin:6px 0 0;
  color:var(--secondary);
  font-size:14px;
}

.block-meta{
  display:flex;
  align-items:center;
  gap:14px;
}

.block-content{
  display:none;
  border-top:1px solid var(--border-soft);
}

.block-content.open{
  display:block;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:var(--surface);
  color:var(--secondary);
  font-size:13px;
  text-align:left;
  padding:14px 16px;
}

td{
  padding:16px;
  border-top:1px solid var(--border-soft);
  vertical-align:top;
}

.summary{
  padding:24px;
  display:grid;
  gap:16px;
}

.zone-red{background:var(--error-bg);}
.zone-yellow{background:var(--warning-bg);}
.zone-green{background:var(--success-bg);}
.zone-platinum{background:var(--info-bg);}
</style>
</head>
<body>

<div class="container">

<div class="hero">
  <h1>CX / Product Review Scorecard</h1>
  <div class="hero-sub">
    Онлайн-форма для оценки зрелости клиентского опыта продукта
  </div>

  <div class="hero-grid">
    <input id="product" placeholder="Продукт">
    <select id="reviewType">
      <option>Запуск продукта</option>
      <option>Квартальное ревью</option>
      <option>Глубокий аудит</option>
      <option>Редизайн сценария</option>
    </select>
    <input id="owner" placeholder="Ответственный">
    <input id="reviewer" placeholder="CX Reviewer">
    <input id="date" type="date">
  </div>
</div>

<div class="sticky">
  <div class="score-panel">
    <div class="score-top">
      <div class="score-main">
        <div class="score-value" id="totalScore">0%</div>
        <div class="badge" id="zoneBadge">Не заполнено</div>
        <div class="progress">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div id="filledMeta">0 / 120 критериев</div>
      </div>

      <div class="btns">
        <button class="btn-secondary" onclick="resetForm()">Очистить</button>
        <button class="btn-secondary" onclick="copySummary()">Скопировать итог</button>
        <button class="btn-primary" onclick="window.print()">PDF / Печать</button>
      </div>
    </div>
  </div>
</div>

<div class="rules">
  <div class="rule"><strong>0 — Нет</strong><br>Критерий отсутствует</div>
  <div class="rule"><strong>1 — Критично</strong><br>Слабая реализация</div>
  <div class="rule"><strong>2 — База</strong><br>Минимальный стандарт</div>
  <div class="rule"><strong>3 — Эталон</strong><br>Лучшее решение</div>
</div>

<div id="blocksContainer"></div>

<div class="card">
  <div class="summary">
    <textarea placeholder="Основные сильные стороны"></textarea>
    <textarea placeholder="Ключевые зоны роста"></textarea>
    <textarea placeholder="Критические риски"></textarea>
    <textarea placeholder="План улучшений"></textarea>
  </div>
</div>

function renderBlocks(){
  const container=document.getElementById('blocksContainer');
  container.innerHTML='';

  blocks.forEach((block,bIndex)=>{
    container.innerHTML += `
      <div class="card">
        <div class="block-header" onclick="toggleBlock(${bIndex})">
          <div class="block-left">
            <h3>${bIndex+1}. ${block.title}</h3>
            <p>${block.desc}</p>
          </div>
          <div class="block-meta">
            <div id="blockFilled-${bIndex}">0 / ${block.items.length}</div>
            <div id="blockScore-${bIndex}">0%</div>
          </div>
        </div>

        <div class="block-content ${bIndex===0 ? 'open' : ''}" id="content-${bIndex}">
          <table>
            <thead>
              <tr>
                <th>Критерий</th>
                <th>Что проверяем</th>
                <th>Оценка</th>
                <th>Комментарий</th>
              </tr>
            </thead>
            <tbody>
              ${block.items.map(item=>`
                <tr>
                  <td><strong>${item[0]}</strong></td>
                  <td>${item[1]}</td>
                  <td>
                    <select onchange="calculateScore()">
                      <option value="">—</option>
                      <option value="0">0</option>
                      <option value="1">1</option>
                      <option value="2">2</option>
                      <option value="3">3</option>
                    </select>
                  </td>
                  <td>
                    <textarea placeholder="Комментарий / рекомендация"></textarea>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  });
}

function toggleBlock(i){
  const content=document.getElementById(`content-${i}`);
  content.classList.toggle('open');
}

function calculateScore(){
  const selects=[...document.querySelectorAll('tbody select')];
  const filled=selects.filter(s=>s.value!=="");
  const total=filled.reduce((sum,s)=>sum+Number(s.value),0);

  const percent=filled.length
    ? Math.round((total/(filled.length*3))*100)
    : 0;

  document.getElementById('totalScore').textContent=percent+'%';
  document.getElementById('progressFill').style.width=percent+'%';
  document.getElementById('filledMeta').textContent=
    `${filled.length} / ${selects.length} критериев`;

  const zone=document.getElementById('zoneBadge');
  zone.className='badge';

  if(percent<=40){
    zone.textContent='Красная зона';
    zone.classList.add('zone-red');
  }else if(percent<=70){
    zone.textContent='Жёлтая зона';
    zone.classList.add('zone-yellow');
  }else if(percent<=90){
    zone.textContent='Зелёная зона';
    zone.classList.add('zone-green');
  }else{
    zone.textContent='Эталонная зона';
    zone.classList.add('zone-platinum');
  }

  updateBlockScores();
}

function updateBlockScores(){
  blocks.forEach((block,index)=>{
    const content=document.getElementById(`content-${index}`);
    const selects=[...content.querySelectorAll('select')];

    const filled=selects.filter(s=>s.value!=="");
    const total=filled.reduce((sum,s)=>sum+Number(s.value),0);

    const percent=filled.length
      ? Math.round((total/(filled.length*3))*100)
      : 0;

    document.getElementById(`blockScore-${index}`).textContent=percent+'%';
    document.getElementById(`blockFilled-${index}`).textContent=
      `${filled.length} / ${selects.length}`;
  });
}

function resetForm(){
  if(!confirm('Очистить форму?')) return;

  document.querySelectorAll('select').forEach(s=>s.value='');
  document.querySelectorAll('textarea').forEach(t=>t.value='');
  document.querySelectorAll('input').forEach(i=>i.value='');

  calculateScore();
}

function copySummary(){
  const text = `
CX / Product Review Summary

Продукт: ${document.getElementById('product').value}
Тип ревью: ${document.getElementById('reviewType').value}
Ответственный: ${document.getElementById('owner').value}
CX Reviewer: ${document.getElementById('reviewer').value}
Дата: ${document.getElementById('date').value}

Итоговая оценка: ${document.getElementById('totalScore').textContent}
Зона качества: ${document.getElementById('zoneBadge').textContent}
${document.getElementById('filledMeta').textContent}
  `.trim();

  navigator.clipboard.writeText(text);
  alert('Итог скопирован');
}
