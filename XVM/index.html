<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Experience Value Model (EVM)</title>
    <style>
        :root {
            --accent-green: #00B956;
            --accent-purple: #731982;
            --field-bg: #F2F4F7;
            --border-btn: #D2D5DA;
            --text-helper: #8F96A4;
            --gradient-start: #00B956;
            --gradient-end: #00D2FF;
            --text-main: #1D2023;
            
            /* Шрифты MegaFon Graphik LC */
            --font-light: 'MegaFon Graphik LC Light', sans-serif;
            --font-reg: 'MegaFon Graphik LC Regular', sans-serif;
            --font-med: 'MegaFon Graphik LC Medium', sans-serif;
            --font-semi: 'MegaFon Graphik LC Semibold', sans-serif;
        }

        body { 
            font-family: var(--font-reg);
            line-height: 1.5; 
            color: var(--text-main); 
            max-width: 1500px; 
            margin: 0 auto; 
            padding: 30px; 
            background: #FFFFFF; 
            -webkit-font-smoothing: antialiased;
        }

        .card { 
            background: #FFFFFF; 
            padding: 24px 32px; 
            border-radius: 20px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04); 
            margin-bottom: 24px; 
            border: 1px solid #F0F2F5;
        }

        h1 { 
            font-family: var(--font-semi); 
            font-size: 28px; 
            color: var(--accent-purple);
            text-transform: uppercase; 
            margin: 0 0 30px 0; 
            letter-spacing: 2px; 
            text-align: center; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        h2 { 
            font-family: var(--font-med); 
            font-size: 18px; 
            margin: 0 0 24px 0; 
            color: var(--text-main); 
            border-left: 5px solid var(--accent-purple); 
            padding-left: 16px; 
        }

        .grid { display: flex; flex-wrap: wrap; gap: 24px; }
        .field-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; }
        
        label { 
            font-family: var(--font-med); 
            margin-bottom: 8px; 
            font-size: 10px; 
            color: var(--text-helper); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        input, select { 
            font-family: var(--font-reg);
            padding: 14px 16px; 
            border: 1px solid transparent; 
            border-radius: 12px; 
            font-size: 15px; 
            background: var(--field-bg);
            color: var(--text-main);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus, select:focus { 
            border-color: var(--accent-purple); 
            background: #FFF;
            outline: none; 
            box-shadow: 0 0 0 4px rgba(115, 25, 130, 0.1); 
        }

        .res-value { font-family: var(--font-semi); font-size: 24px; color: var(--accent-purple); white-space: nowrap; }
        .res-cr { font-family: var(--font-semi); font-size: 24px; color: var(--accent-green); white-space: nowrap; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { 
            font-family: var(--font-med); 
            padding: 14px 10px; 
            font-size: 10px; 
            text-transform: uppercase; 
            color: var(--text-helper); 
            text-align: center; 
            border-bottom: 2px solid var(--field-bg); 
        }
        td { 
            font-family: var(--font-reg);
            padding: 12px 10px; 
            text-align: center; 
            border-bottom: 1px solid var(--field-bg); 
            font-size: 14px; 
            white-space: nowrap; 
        }

        .highlight-money { font-family: var(--font-semi); color: var(--accent-purple); }
        .highlight-green { font-family: var(--font-semi); color: var(--accent-green); }

        /* Кнопки с градиентом при наведении */
        .btn { 
            font-family: var(--font-med);
            background-color: var(--accent-green); 
            color: white; 
            border: 1px solid var(--border-btn); 
            padding: 14px 32px; 
            border-radius: 14px; 
            cursor: pointer; 
            font-size: 13px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            margin-top: 20px;
            letter-spacing: 1px;
            background-image: linear-gradient(90deg, var(--gradient-start) 0%, var(--gradient-start) 100%);
        }
        .btn:hover { 
            background-image: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 185, 86, 0.25);
            border-color: transparent;
        }

        .btn-del { 
            background: white; 
            border: 1px solid var(--border-btn); 
            color: var(--text-helper); 
            cursor: pointer; 
            width: 30px; 
            height: 30px; 
            border-radius: 10px; 
            font-size: 14px; 
            transition: all 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto; 
        }
        .btn-del:hover { background: #FFF1F0; color: #FF4D4F; border-color: #FF4D4F; }

        .stage-selector-wrap { 
            max-width: 450px; 
            background: var(--field-bg); 
            padding: 20px 24px; 
            border-radius: 16px; 
            margin-bottom: 24px; 
        }

        .no-wrap { white-space: nowrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>💎 Experience Value Model</h1>

    <!-- 1. ECONOMY -->
    <div class="card">
        <h2>1. Глобальные константы сценария</h2>
        <div class="grid">
            <div class="field-group">
                <label>Вход в сценарий (Старт)</label>
                <input type="number" id="global-start" placeholder="0" oninput="updateAll()">
            </div>
            <div class="field-group">
                <label>Финальные сделки (Выход)</label>
                <input type="number" id="global-end" placeholder="0" oninput="updateAll()">
            </div>
            <div class="field-group">
                <label>Общая CR сценария</label>
                <div id="global-cr" class="res-cr">0%</div>
            </div>
        </div>
        <div class="grid" style="margin-top: 30px; padding-top: 30px; border-top: 1px solid var(--field-bg);">
            <div class="field-group">
                <label>AOV (Выручка, ₽)</label>
                <input type="number" id="aov" placeholder="0" oninput="updateAll()">
            </div>
            <div class="field-group">
                <label>ARPU (Подписка, ₽)</label>
                <input type="number" id="arpu" placeholder="0" oninput="updateAll()">
            </div>
            <div class="field-group">
                <label>Lifetime (Месяцев)</label>
                <input type="number" id="lt" placeholder="0" oninput="updateAll()">
            </div>
            <div class="field-group">
                <label>Итого LTV клиента</label>
                <div id="ltv-res" class="res-value">0 ₽</div>
            </div>
        </div>
    </div>

    <!-- 2. FUNNEL -->
    <div class="card">
        <h2>2. Потенциал этапов воронки</h2>
        <table>
            <thead>
                <tr>
                    <th style="width: 250px; text-align: left;">Название этапа</th>
                    <th>Вход</th>
                    <th>Выход</th>
                    <th>Потери</th>
                    <th>D-CR</th>
                    <th>Pot. Deals</th>
                    <th>Pot. AOV</th>
                    <th>Pot. LTV</th>
                    <th style="width: 60px;"></th>
                </tr>
            </thead>
            <tbody id="funnel-body"></tbody>
        </table>
        <button class="btn" onclick="addStage()">+ Добавить этап</button>
    </div>

    <!-- 3. PROBLEMS -->
    <div class="card">
        <h2>3. Оценка проблем на этапе</h2>
        <div class="stage-selector-wrap">
            <label>Выберите этап для анализа</label>
            <select id="stage-select" onchange="updateAll()"></select>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th style="text-align: left;">Описание проблемы</th>
                    <th style="width: 140px;">Reach (Охват)</th>
                    <th style="width: 140px;">Impact (Сила)</th>
                    <th style="width: 140px;">Confidence</th>
                    <th>Индекс (F)</th>
                    <th>Вес (%)</th>
                    <th>AOV Cost</th>
                    <th>LTV Cost</th>
                    <th style="width: 60px;"></th>
                </tr>
            </thead>
            <tbody id="problems-body"></tbody>
        </table>
        <button class="btn" onclick="addProblem()">+ Добавить проблему</button>
    </div>
</div>

<script>
    let funnelStages = [];
    let problems = [];

    const options = {
        reach: [{v: 1.0, t: "1.0 (Global)"}, {v: 0.8, t: "0.8 (High)"}, {v: 0.5, t: "0.5 (Medium)"}, {v: 0.2, t: "0.2 (Low)"}, {v: 0.1, t: "0.1 (Local)"}],
        impact: [{v: 1.0, t: "1.0 (Blocker)"}, {v: 0.5, t: "0.5 (Critical)"}, {v: 0.2, t: "0.2 (Friction)"}, {v: 0.05, t: "0.05 (Minor)"}, {v: 0.01, t: "0.01 (None)"}],
        conf: [{v: 1.0, t: "1.0 (Data)"}, {v: 0.8, t: "0.8 (Research)"}, {v: 0.5, t: "0.5 (Support)"}, {v: 0.2, t: "0.2 (Hypo)"}]
    };

    function addStage() {
        funnelStages.push({ name: `Этап ${funnelStages.length + 1}`, s: 0 });
        renderFunnel(); updateAll();
    }

    function removeStage(index) {
        funnelStages.splice(index, 1);
        renderFunnel(); updateAll();
    }

    function addProblem() {
        problems.push({ name: "", reach: 1.0, impact: 0.2, conf: 0.8 });
        renderProblems(); updateAll();
    }

    function removeProblem(index) {
        problems.splice(index, 1);
        renderProblems(); updateAll();
    }

    function updateAll() {
        const start = parseFloat(document.getElementById('global-start').value) || 0;
        const end = parseFloat(document.getElementById('global-end').value) || 0;
        const aov = parseFloat(document.getElementById('aov').value) || 0;
        const arpu = parseFloat(document.getElementById('arpu').value) || 0;
        const lt = parseFloat(document.getElementById('lt').value) || 0;
        const ltv = aov + (arpu * lt);

        document.getElementById('ltv-res').innerText = ltv.toLocaleString() + " ₽";
        document.getElementById('global-cr').innerText = (start > 0 ? (end / start * 100).toFixed(2) : 0) + "%";

        let currentInput = start;

        funnelStages.forEach((stage, i) => {
            stage.v = currentInput;
            const losses = stage.v - stage.s;
            const dcr = stage.v > 0 ? (end / stage.v) : 0;
            const pd = losses * dcr;
            stage.potAov = pd * aov;
            stage.potLtv = pd * ltv;

            const row = document.querySelector(`#funnel-body tr:nth-child(${i+1})`);
            if (row) {
                row.querySelector('.td-vol').innerText = Math.round(stage.v).toLocaleString();
                row.querySelector('.td-lost').innerText = Math.round(losses).toLocaleString();
                row.querySelector('.td-dcr').innerText = (dcr * 100).toFixed(2) + "%";
                row.querySelector('.td-pd').innerText = Math.round(pd).toLocaleString();
                row.querySelector('.td-paov').innerText = Math.round(stage.potAov).toLocaleString() + " ₽";
                row.querySelector('.td-pltv').innerText = Math.round(stage.potLtv).toLocaleString() + " ₽";
            }
            currentInput = stage.s;
        });

        updateProblemsData();
        updateSelectOptions();
    }

    function renderFunnel() {
        const body = document.getElementById('funnel-body');
        body.innerHTML = '';
        funnelStages.forEach((stage, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" style="text-align:left; background:var(--field-bg);" value="${stage.name}" oninput="funnelStages[${i}].name=this.value; updateSelectOptions()"></td>
                <td class="td-vol">0</td>
                <td><input type="number" value="${stage.s}" style="background:var(--field-bg);" oninput="funnelStages[${i}].s=parseFloat(this.value); updateAll()"></td>
                <td class="td-lost">0</td>
                <td class="td-dcr highlight-green">0%</td>
                <td class="td-pd highlight-money">0</td>
                <td class="td-paov highlight-money">0 ₽</td>
                <td class="td-pltv highlight-money">0 ₽</td>
                <td><button class="btn-del" onclick="removeStage(${i})">✕</button></td>
            `;
            body.appendChild(tr);
        });
    }

    function renderProblems() {
        const body = document.getElementById('problems-body');
        body.innerHTML = '';
        problems.forEach((p, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" style="text-align:left; background:var(--field-bg);" placeholder="Описание барьера..." value="${p.name}" oninput="problems[${i}].name=this.value"></td>
                <td><select style="background:var(--field-bg);" onchange="problems[${i}].reach=parseFloat(this.value); updateAll()">${options.reach.map(o => `<option value="${o.v}" ${o.v==p.reach?'selected':''}>${o.t}</option>`).join('')}</select></td>
                <td><select style="background:var(--field-bg);" onchange="problems[${i}].impact=parseFloat(this.value); updateAll()">${options.impact.map(o => `<option value="${o.v}" ${o.v==p.impact?'selected':''}>${o.t}</option>`).join('')}</select></td>
                <td><select style="background:var(--field-bg);" onchange="problems[${i}].conf=parseFloat(this.value); updateAll()">${options.conf.map(o => `<option value="${o.v}" ${o.v==p.conf?'selected':''}>${o.t}</option>`).join('')}</select></td>
                <td class="td-f">0</td><td class="td-w">0%</td>
                <td class="td-a-cost highlight-money">0 ₽</td><td class="td-l-cost highlight-money">0 ₽</td>
                <td><button class="btn-del" onclick="removeProblem(${i})">✕</button></td>
            `;
            body.appendChild(tr);
        });
    }

    function updateProblemsData() {
        const activeIdx = document.getElementById('stage-select').value;
        const stage = funnelStages[activeIdx] || { potAov: 0, potLtv: 0, pd: 0 };
        let sumF = 0;
        problems.forEach(p => {
            p.f = p.impact < 0.05 ? 0 : (p.reach * p.impact * p.conf);
            sumF += p.f;
        });
        problems.forEach((p, i) => {
            const weight = sumF > 0 ? (p.f / sumF) : 0;
            const row = document.querySelector(`#problems-body tr:nth-child(${i+1})`);
            if (row) {
                row.querySelector('.td-f').innerText = p.f.toFixed(3);
                row.querySelector('.td-w').innerText = p.f > 0 ? (weight * 100).toFixed(1) + "%" : "0%";
                row.querySelector('.td-a-cost').innerText = Math.round(stage.potAov * weight).toLocaleString() + " ₽";
                row.querySelector('.td-l-cost').innerText = Math.round(stage.potLtv * weight).toLocaleString() + " ₽";
            }
        });
    }

    function updateSelectOptions() {
        const select = document.getElementById('stage-select');
        const currentVal = select.value;
        select.innerHTML = '';
        funnelStages.forEach((stage, i) => {
            const opt = document.createElement('option');
            opt.value = i; opt.text = stage.name;
            if (i == currentVal) opt.selected = true;
            select.appendChild(opt);
        });
    }

    renderFunnel(); renderProblems(); updateAll();
</script>
</body>
</html>
